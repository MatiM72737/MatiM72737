name: Update GitHub Readme Stats

on:
  schedule:
    - cron: "0 4 * * *"        # codziennie o 4:00 rano (możesz zmienić)
  workflow_dispatch:           # możesz odpalić ręcznie

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}   # na razie wystarczy, później PAT jeśli chcesz private

      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=MatiM72737&show_icons=true&theme=tokyonight&hide_border=true&bg_color=00000000&include_all_commits=true&hide_rank=false&rank_icon=github
          path: profile/stats.svg
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=MatiM72737&layout=compact&theme=tokyonight&hide_border=true&bg_color=00000000&size_weight=0.5&count_weight=0.5&langs_count=10
          path: profile/top-langs.svg
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update github readme stats cards" || exit 0
          git push
