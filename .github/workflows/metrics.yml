name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}] # Aktualizacja co 12h
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: MatiM72737
          template: classic
          config_timezone: Europe/Warsaw
          
          # Podstawowe sekcje
          base: header, activity, community, repositories, metadata
          
          # Konfiguracja języków (to, o co prosiłeś)
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage # Wyświetli liczby i procenty
          plugin_languages_threshold: 0%
          plugin_languages_limit: 8
          
          # Dodatkowe bajery
          plugin_isocalendar: yes # Kalendarz aktywności
          plugin_lines: yes       # Statystyki linii kodu
